<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Next Steps</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f3f6fb; --bg2: #e7edf6; --panel: #ffffff; --panel2: #f7f9fd;
    --text: #1a1f2e; --muted: #6b7280; --border: #e2e8f0;
    --accent: #2563eb; --accent-soft: #dbeafe;
    --good: #16a34a; --good-soft: #dcfce7;
    --bad: #dc2626; --bad-soft: #fee2e2;
    --warn: #d97706; --warn-soft: #fef3c7;
    --health: #ef4444; --wellbeing: #8b5cf6; --money: #16a34a;
    --law: #dc2626;
    --shadow: 0 2px 12px rgba(15, 23, 42, 0.06);
    --shadow-lg: 0 8px 28px rgba(15, 23, 42, 0.1);
  }
  body.dark {
    --bg: #0b0e14; --bg2: #12151d; --panel: #181c25; --panel2: #1e2330;
    --text: #e8ecf3; --muted: #8a93a6; --border: #2a3040;
    --accent: #60a5fa; --accent-soft: #1e3a8a;
    --good: #4ade80; --good-soft: #14532d;
    --bad: #f87171; --bad-soft: #7f1d1d;
    --warn: #fbbf24; --warn-soft: #78350f;
    --shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
    --shadow-lg: 0 8px 28px rgba(0, 0, 0, 0.6);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: "Inter", -apple-system, "Segoe UI", system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; font-size: 17px; line-height: 1.55;
    transition: background 0.25s, color 0.25s;
  }
  .alert-overlay { position: fixed; inset: 0; pointer-events: none; z-index: 100; }
  body.alert-law .alert-overlay { animation: alertPolice 1s infinite; }
  @keyframes alertPolice {
    0%, 49% { box-shadow: inset 0 0 80px 0 rgba(220,38,38,0.45); }
    50%, 100% { box-shadow: inset 0 0 80px 0 rgba(37,99,235,0.45); }
  }
  body.flash-good { animation: fg 0.8s; }
  body.flash-bad { animation: fb 0.8s; }
  body.flash-mid { animation: fm 0.8s; }
  @keyframes fg { 0% { box-shadow: inset 0 0 120px 0 rgba(22,163,74,0.4); } 100% { box-shadow: inset 0 0 0 0 transparent; } }
  @keyframes fb { 0% { box-shadow: inset 0 0 120px 0 rgba(220,38,38,0.4); } 100% { box-shadow: inset 0 0 0 0 transparent; } }
  @keyframes fm { 0% { box-shadow: inset 0 0 120px 0 rgba(217,119,6,0.35); } 100% { box-shadow: inset 0 0 0 0 transparent; } }

  .topbar {
    position: sticky; top: 0; z-index: 10;
    background: var(--panel); border-bottom: 1px solid var(--border);
    padding: 12px 20px; display: flex; align-items: center; gap: 12px;
    box-shadow: var(--shadow);
  }
  .topbar .brand { font-weight: 800; font-size: 20px; letter-spacing: -0.3px; }
  .topbar .brand .dot { color: var(--accent); }
  .topbar .spacer { flex: 1; }
  .topbar button.icon {
    background: var(--panel2); border: 1px solid var(--border);
    color: var(--text); padding: 6px 12px; border-radius: 8px;
    cursor: pointer; font: inherit; font-size: 13px; font-weight: 600;
  }
  .topbar button.icon:hover { background: var(--bg2); }
  .topbar .char-name { color: var(--muted); font-size: 13px; }

  .wrap { max-width: 860px; margin: 0 auto; padding: 20px 20px 60px; }

  /* Tabs */
  .tabs {
    display: flex; gap: 4px; margin-bottom: 20px;
    background: var(--panel); padding: 4px; border-radius: 12px;
    border: 1px solid var(--border); box-shadow: var(--shadow);
  }
  .tab {
    flex: 1; padding: 10px 14px; border-radius: 8px;
    text-align: center; cursor: pointer; font-weight: 600; font-size: 15px;
    color: var(--muted); border: none; background: transparent; font-family: inherit;
    transition: all 0.15s;
  }
  .tab.active { background: var(--accent); color: white; }
  .tab:not(.active):hover { background: var(--bg2); color: var(--text); }

  /* Menu cards */
  .menu-card {
    background: var(--panel); border: 1.5px solid var(--border);
    border-radius: 16px; padding: 20px 22px; margin-bottom: 12px;
    cursor: pointer; box-shadow: var(--shadow);
    transition: all 0.15s;
  }
  .menu-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: var(--shadow-lg); }
  .menu-card h3 { margin: 0 0 4px; font-size: 19px; color: var(--accent); }
  .menu-card .who { color: var(--muted); font-size: 13px; margin-bottom: 8px; font-weight: 500; }
  .menu-card .desc { font-size: 14px; color: var(--text); line-height: 1.55; }

  /* Stats + law */
  .statsgrid {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;
    margin-bottom: 10px;
  }
  .stat {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 14px; padding: 12px 14px; box-shadow: var(--shadow);
  }
  .stat .lbl { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; font-weight: 700; }
  .stat .val { font-size: 22px; font-weight: 700; margin-top: 2px; }
  .bar { height: 6px; background: var(--bg2); border-radius: 6px; margin-top: 8px; overflow: hidden; }
  .bar > div { height: 100%; border-radius: 6px; transition: width 0.35s; }
  .stat.health .bar > div { background: var(--health); }
  .stat.wellbeing .bar > div { background: var(--wellbeing); }
  .law-wrap {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; padding: 10px 14px; box-shadow: var(--shadow);
    margin-bottom: 10px;
  }
  .law-wrap .row { display: flex; justify-content: space-between; align-items: center; }
  .law-wrap .lbl { font-size: 11px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; }
  .law-wrap .val { font-size: 15px; font-weight: 700; }
  .law-wrap .bar { height: 6px; margin-top: 6px; }
  .law-wrap .bar > div { background: var(--law); box-shadow: 0 0 10px var(--law); }
  .law-wrap.hot { animation: meterPulse 1.2s infinite; }
  @keyframes meterPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.012); } }

  .mods { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; min-height: 12px; }
  .chip {
    background: var(--warn-soft); color: var(--warn);
    padding: 3px 10px; border-radius: 999px; font-size: 12px; font-weight: 600;
  }
  .chip.neutral { background: var(--accent-soft); color: var(--accent); }

  .scene {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 18px; padding: 24px 26px; box-shadow: var(--shadow);
    margin-bottom: 14px; white-space: pre-wrap;
    font-size: 17px; line-height: 1.65;
  }
  .scene .title {
    color: var(--accent); font-weight: 700; font-size: 13px;
    letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 10px;
  }
  .scene h2 { margin: 0 0 8px; font-size: 22px; }

  .feedback {
    padding: 14px 18px; border-radius: 14px; margin-bottom: 14px;
    font-size: 15px; border: 1px solid transparent; box-shadow: var(--shadow);
  }
  .feedback.good { background: var(--good-soft); color: var(--good); border-color: var(--good); }
  .feedback.bad { background: var(--bad-soft); color: var(--bad); border-color: var(--bad); }
  .feedback.mid { background: var(--warn-soft); color: var(--warn); border-color: var(--warn); }
  .feedback .label { font-weight: 800; text-transform: uppercase; font-size: 11px; letter-spacing: 1.2px; margin-bottom: 4px; }
  .feedback .deltas { margin-top: 8px; font-size: 13px; font-weight: 600; display: flex; gap: 10px; flex-wrap: wrap; }
  .delta.pos { color: var(--good); }
  .delta.neg { color: var(--bad); }

  .choices { display: flex; flex-direction: column; gap: 10px; }
  button.choice {
    text-align: left; cursor: pointer; font: inherit;
    background: var(--panel); color: var(--text);
    border: 1.5px solid var(--border); border-radius: 14px;
    padding: 14px 16px; font-size: 16px; line-height: 1.5;
    transition: all 0.15s; box-shadow: var(--shadow);
  }
  button.choice:hover { border-color: var(--accent); background: var(--panel2); transform: translateY(-1px); }
  button.choice:active { transform: translateY(0); }
  button.choice .letter { display: inline-block; width: 26px; color: var(--accent); font-weight: 800; }

  .drawer-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 50; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
  .drawer-bg.open { opacity: 1; pointer-events: auto; }
  .drawer {
    position: fixed; top: 0; right: 0; bottom: 0; width: min(480px, 100%);
    background: var(--panel); z-index: 51;
    transform: translateX(100%); transition: transform 0.3s;
    overflow-y: auto; padding: 20px; border-left: 1px solid var(--border);
  }
  .drawer.open { transform: translateX(0); }
  .drawer h2 { margin: 0 0 4px; font-size: 22px; }
  .drawer .sub { color: var(--muted); font-size: 13px; margin-bottom: 16px; }
  .note {
    background: var(--panel2); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px; margin-bottom: 10px;
  }
  .note .day-tag { color: var(--accent); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
  .note .q { font-weight: 600; font-size: 14px; margin: 4px 0 8px; }
  .note .a-picked {
    padding: 8px 10px; border-radius: 8px; font-size: 13px;
    background: var(--good-soft); color: var(--good);
    border-left: 3px solid var(--good); margin-bottom: 6px;
  }
  .note .a-picked.bad { background: var(--bad-soft); color: var(--bad); border-color: var(--bad); }
  .note .a-picked.mid { background: var(--warn-soft); color: var(--warn); border-color: var(--warn); }
  .note .a-fb { font-size: 13px; color: var(--muted); margin: 6px 0 8px; }
  .note .a-other {
    padding: 6px 10px; border-radius: 8px; font-size: 12px;
    background: var(--bg2); color: var(--muted); text-decoration: line-through;
    margin-bottom: 4px; opacity: 0.7;
  }
  .drawer .close {
    position: absolute; top: 16px; right: 16px;
    background: var(--panel2); border: 1px solid var(--border);
    width: 32px; height: 32px; border-radius: 50%; font-size: 18px;
    cursor: pointer; color: var(--text); font-weight: 700;
  }

  .ending {
    text-align: center; padding: 40px 24px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 18px; box-shadow: var(--shadow-lg);
  }
  .ending.good { border-color: var(--good); }
  .ending.bad { border-color: var(--bad); }
  .ending.mid { border-color: var(--warn); }
  .ending h1 { margin: 0 0 10px; font-size: 30px; }
  .ending h1.good { color: var(--good); }
  .ending h1.bad { color: var(--bad); }
  .ending h1.mid { color: var(--warn); }
  .restart {
    margin-top: 20px; background: var(--accent); color: white;
    border: none; padding: 12px 24px; border-radius: 12px;
    font-weight: 700; font-size: 15px; cursor: pointer; font-family: inherit;
  }
  .restart.ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); margin-left: 8px; }

  .ending-analysis {
    text-align: left; margin-top: 28px; padding-top: 24px;
    border-top: 1px solid var(--border);
  }
  .ending-analysis h3 {
    font-size: 12px; text-transform: uppercase; letter-spacing: 1.4px;
    color: var(--muted); margin: 0 0 12px; font-weight: 800;
  }
  .reason {
    padding: 11px 14px; border-radius: 10px; margin-bottom: 8px;
    font-size: 14px; line-height: 1.55;
    display: flex; gap: 10px; align-items: flex-start;
    border: 1px solid transparent;
  }
  .reason.good { background: var(--good-soft); color: var(--good); border-color: var(--good); }
  .reason.bad { background: var(--bad-soft); color: var(--bad); border-color: var(--bad); }
  .reason.mid { background: var(--warn-soft); color: var(--warn); border-color: var(--warn); }
  .reason .ic { font-weight: 800; flex-shrink: 0; width: 18px; }
  .lesson {
    padding: 14px 16px; border-radius: 12px; margin-bottom: 10px;
    background: var(--panel2); border-left: 4px solid var(--accent);
    text-align: left;
  }
  .lesson .t { font-weight: 700; font-size: 15px; margin-bottom: 4px; color: var(--text); }
  .lesson .d { font-size: 14px; color: var(--muted); line-height: 1.6; }
  .ending { text-align: left; }
  .ending h1 { text-align: center; }
  .ending .narrative { text-align: center; font-size: 16px; margin: 16px 0 8px; line-height: 1.7; }
  .ending .stats-line { text-align: center; color: var(--muted); font-size: 13px; margin: 12px 0; }
  .ending .actions-row { text-align: center; margin-top: 20px; }

  .setup-card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 18px; padding: 24px; margin-bottom: 14px; box-shadow: var(--shadow);
  }
  .setup-card h3 { margin: 0 0 6px; font-size: 18px; }
  .setup-card .q { color: var(--muted); font-size: 14px; margin-bottom: 12px; }
  .setup-opts { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 10px; }
  .setup-opt {
    background: var(--panel2); border: 2px solid var(--border);
    border-radius: 12px; padding: 14px; cursor: pointer;
    font-size: 14px; transition: all 0.15s;
  }
  .setup-opt:hover { border-color: var(--accent); }
  .setup-opt.selected { border-color: var(--accent); background: var(--accent-soft); }
  .setup-opt .t { font-weight: 700; font-size: 15px; display: block; margin-bottom: 4px; }
  .setup-opt .d { color: var(--muted); font-size: 13px; }

  @media (max-width: 640px) {
    .wrap { padding: 14px; }
    .statsgrid { grid-template-columns: 1fr; }
    .setup-opts { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="alert-overlay"></div>

<div class="topbar">
  <div class="brand">Next<span class="dot">Steps</span></div>
  <div class="char-name" id="char-name"></div>
  <div class="spacer"></div>
  <button class="icon" id="notebook-btn" onclick="toggleDrawer()" style="display:none">📓 Notebook</button>
  <button class="icon" id="menu-btn" onclick="returnToMenu()" style="display:none">← Menu</button>
  <button class="icon" onclick="toggleDark()">🌓</button>
</div>

<div class="wrap">
  <div id="stats-wrap" style="display:none;">
    <div class="statsgrid">
      <div class="stat health"><div class="lbl">Health</div><div class="val"><span id="v-health">80</span>/100</div><div class="bar"><div id="b-health" style="width:80%"></div></div></div>
      <div class="stat wellbeing"><div class="lbl">Wellbeing</div><div class="val"><span id="v-well">70</span>/100</div><div class="bar"><div id="b-well" style="width:70%"></div></div></div>
      <div class="stat money"><div class="lbl">Money</div><div class="val">$<span id="v-money">0</span></div></div>
    </div>
    <div class="law-wrap" id="law-wrap">
      <div class="row">
        <span class="lbl">⚖ Law — heat from IRS, police, and feds</span>
        <span class="val"><span id="v-law">0</span>%</span>
      </div>
      <div class="bar"><div id="b-law" style="width:0%"></div></div>
    </div>
    <div class="mods" id="mods"></div>
  </div>

  <div id="game"></div>
</div>

<div class="drawer-bg" id="drawer-bg" onclick="toggleDrawer()"></div>
<div class="drawer" id="drawer">
  <button class="close" onclick="toggleDrawer()">×</button>
  <h2>📓 Notebook</h2>
  <div class="sub">Every decision you've made, the feedback you got, and the roads not taken.</div>
  <div id="notes"></div>
</div>

<script>
// ============================================================
// STATE
// ============================================================
let state = null;
let activeTab = "campaign";

function freshState(startMoney) {
  return {
    char: { name: "", modifiers: new Set() },
    stats: { health: 80, wellbeing: 70, money: startMoney || 0 },
    law: 0,
    flags: new Set(),
    pendingEvents: [],
    turn: 0,
    notebook: [],
    currentScenario: null,
    sceneMap: null,
    gameOver: false,
    lastDelta: null,
  };
}

function scheduleEvent(turnsFromNow, sceneId) {
  state.pendingEvents.push({ triggerTurn: state.turn + turnsFromNow, sceneId });
}
function checkPendingEvents() {
  const due = state.pendingEvents.find(e => e.triggerTurn <= state.turn);
  if (due) { state.pendingEvents = state.pendingEvents.filter(e => e !== due); return due.sceneId; }
  return null;
}

// ============================================================
// MODIFIERS
// ============================================================
const modifierDefs = {
  // Legal record
  clean_record: { name: "Clean Record", neutral: true },
  criminal_record: { name: "Criminal Record", lawMult: 1.5 },
  juvenile_record: { name: "Sealed Juvenile Record", lawMult: 1.15 },

  // Citizenship / documentation
  citizen: { name: "U.S. Citizen", neutral: true },
  f1_visa: { name: "F-1 International Student", lawMult: 1.3 },
  daca_recipient: { name: "DACA Recipient", lawMult: 1.2 },
  green_card: { name: "Permanent Resident", lawMult: 1.05 },

  // Family support
  family_support: { name: "Supportive Family", neutral: true },
  no_safety_net: { name: "No Safety Net", wellbeingDrain: 1 },
  caretaker: { name: "Caretaker for a Parent", moneyDrain: 10, wellbeingDrain: 1 },
  estranged: { name: "Estranged from Family", wellbeingDrain: 0.5 },

  // Financial starting point
  modest_savings: { name: "Modest Savings", startMoney: 500 },
  paycheck_to_paycheck: { name: "Paycheck to Paycheck", neutral: true },
  broke: { name: "Broke", startMoney: -400 },
  student_debt: { name: "Student Loan Debt ($32k)", wellbeingDrain: 0.5 },

  // Physical health
  healthy: { name: "Healthy", neutral: true },
  chronic_condition: { name: "Chronic Condition", startHealth: -15, healthDrain: 0.5 },
  disability: { name: "Physical Disability", startHealth: -20, healthDrain: 0.3 },
  uninsured_chronic: { name: "Uninsured + Chronic", startHealth: -20, healthDrain: 0.8, startMoneyMult: 0.9 },

  // Mental health
  mentally_well: { name: "Mentally Well", neutral: true },
  anxiety: { name: "Anxiety Disorder", startWellbeing: -12, wellbeingDrain: 0.5 },
  depression_history: { name: "History of Depression", startWellbeing: -10, wellbeingDrain: 0.4 },
  neurodivergent: { name: "ADHD / Neurodivergent", wellbeingDrain: 0.2 },

  // Background / situation
  traditional_student: { name: "Traditional Student", neutral: true },
  first_gen_student: { name: "First-Generation Student", wellbeingDrain: 0.3 },
  returning_adult: { name: "Returning Adult Learner", startMoney: 800 },
  working_full_time: { name: "Working Full-Time", startMoney: 600, wellbeingDrain: 0.3 },
  homeless_history: { name: "Recently Housing-Insecure", startMoney: -300, wellbeingDrain: 0.5 },

  // Financial literacy
  finance_novice: { name: "No Financial Education", neutral: true },
  finance_savvy: { name: "Read a Personal Finance Book", wellbeingBoost: true },
  scammed_before: { name: "Scammed Before (wiser now)", neutral: true },
};

// Groups shown in freeplay character creation. Data-driven.
const modifierGroups = [
  { id: "record", label: "Legal record", q: "Any legal trouble on your record?", opts: [
    { val: "clean_record",    t: "No record",           d: "Clean background. Hireable. Baseline." },
    { val: "juvenile_record", t: "Sealed juvenile",     d: "Minor charge at 15, sealed. Occasionally surfaces. Law heat +15%." },
    { val: "criminal_record", t: "Misdemeanor at 17",   d: "Shoplifting. Shows on background checks. Law heat builds 50% faster." },
  ]},
  { id: "visa", label: "Citizenship / documentation", q: "What's on your paperwork?", opts: [
    { val: "citizen",         t: "U.S. Citizen",          d: "No visa restrictions." },
    { val: "green_card",      t: "Permanent Resident",    d: "Green card. Most rights of citizen; deportable for serious crimes." },
    { val: "f1_visa",         t: "F-1 International",     d: "Can only work on-campus, 20 hr/wk. Off-campus work = deportable. Law heat +30%." },
    { val: "daca_recipient",  t: "DACA Recipient",        d: "Work-authorized via renewable permit. Any arrest can jeopardize status. Law heat +20%." },
  ]},
  { id: "family", label: "Family support", q: "If things go sideways, who do you call?", opts: [
    { val: "family_support",  t: "Supportive family",    d: "Parents can bail you out once." },
    { val: "estranged",       t: "Estranged from family", d: "You don't talk. No bailout. Slight ongoing wellbeing drain." },
    { val: "no_safety_net",   t: "No safety net",        d: "You're your own emergency contact. Wellbeing drains -1 per choice." },
    { val: "caretaker",       t: "Caring for a parent",   d: "You support an aging parent. -$10 and -1 wellbeing per choice." },
  ]},
  { id: "finance", label: "Financial starting point", q: "Where do you start money-wise?", opts: [
    { val: "modest_savings",       t: "Modest savings",       d: "A $500 buffer before the scenario begins." },
    { val: "paycheck_to_paycheck", t: "Paycheck to paycheck", d: "Standard. The scenario's default starting amount." },
    { val: "broke",                t: "Broke",                d: "Start with -$400. Overdraft fees loom." },
    { val: "student_debt",         t: "Student loans ($32k)", d: "Monthly payments grind on your wellbeing each turn." },
  ]},
  { id: "health", label: "Physical health", q: "How's your body holding up?", opts: [
    { val: "healthy",             t: "Healthy",               d: "Baseline. No starting penalty." },
    { val: "chronic_condition",   t: "Chronic condition",     d: "Asthma, diabetes, or similar. Start with -15 health; slow drain each turn." },
    { val: "disability",          t: "Physical disability",   d: "Limits some choices. Start with -20 health; fewer job types available." },
    { val: "uninsured_chronic",   t: "Chronic + Uninsured",   d: "Worst case. Medical bills escalate fast. Start with -20 health and faster drain." },
  ]},
  { id: "mental", label: "Mental health", q: "What's your mental baseline?", opts: [

function hasMod(key) { return state?.char.modifiers.has(key); }

function lawTick(base) {
  let v = base;
  if (hasMod("criminal_record")) v *= 1.5;
  if (hasMod("juvenile_record")) v *= 1.15;
  if (hasMod("f1_visa")) v *= 1.3;
  if (hasMod("daca_recipient")) v *= 1.2;
  if (hasMod("green_card")) v *= 1.05;
  return Math.round(v);
}

function applyStartingModifiers(s) {
  const m = s.char.modifiers;
  if (m.has("chronic_condition")) s.stats.health -= 15;
  if (m.has("disability")) s.stats.health -= 20;
  if (m.has("uninsured_chronic")) { s.stats.health -= 20; s.stats.money = Math.round(s.stats.money * 0.9); }
  if (m.has("anxiety")) s.stats.wellbeing -= 12;
  if (m.has("depression_history")) s.stats.wellbeing -= 10;
  if (m.has("modest_savings")) s.stats.money += 500;
  if (m.has("broke")) s.stats.money -= 400;
  if (m.has("returning_adult")) s.stats.money += 800;
  if (m.has("working_full_time")) s.stats.money += 600;
  if (m.has("homeless_history")) s.stats.money -= 300;
  if (m.has("finance_savvy")) s.stats.wellbeing += 5;
  s.stats.health = clamp(s.stats.health, 1, 100);
  s.stats.wellbeing = clamp(s.stats.wellbeing, 1, 100);
  s.stats.money = Math.max(0, s.stats.money);
}

// ============================================================
// DELTA APPLICATION
// ============================================================
function applyEffects(s, e) {
  e = e || {};
  if (e.money)     s.stats.money += e.money;
  if (e.health)    s.stats.health = clamp(s.stats.health + e.health, 0, 100);
  if (e.wellbeing) s.stats.wellbeing = clamp(s.stats.wellbeing + e.wellbeing, 0, 100);
  if (e.law)       s.law = clamp(s.law + (e.law > 0 ? lawTick(e.law) : e.law), 0, 100);
  if (e.addFlags)  e.addFlags.forEach(f => s.flags.add(f));
  if (e.rmFlags)   e.rmFlags.forEach(f => s.flags.delete(f));
  if (e.schedule)  e.schedule.forEach(([t, id]) => scheduleEvent(t, id));
  if (hasMod("no_safety_net"))       s.stats.wellbeing = Math.max(0, s.stats.wellbeing - 1);
  if (hasMod("caretaker"))           { s.stats.money -= 10; s.stats.wellbeing = Math.max(0, s.stats.wellbeing - 1); }
  if (hasMod("estranged"))           s.stats.wellbeing = Math.max(0, s.stats.wellbeing - 0.5);
  if (hasMod("student_debt"))        s.stats.wellbeing = Math.max(0, s.stats.wellbeing - 0.5);
  if (hasMod("chronic_condition"))   s.stats.health = Math.max(0, s.stats.health - 0.5);
  if (hasMod("disability"))          s.stats.health = Math.max(0, s.stats.health - 0.3);
  if (hasMod("uninsured_chronic"))   s.stats.health = Math.max(0, s.stats.health - 0.8);
  if (hasMod("anxiety"))             s.stats.wellbeing = Math.max(0, s.stats.wellbeing - 0.5);
  if (hasMod("depression_history"))  s.stats.wellbeing = Math.max(0, s.stats.wellbeing - 0.4);
  if (hasMod("neurodivergent"))      s.stats.wellbeing = Math.max(0, s.stats.wellbeing - 0.2);
  if (hasMod("first_gen_student"))   s.stats.wellbeing = Math.max(0, s.stats.wellbeing - 0.3);
  if (hasMod("working_full_time"))   s.stats.wellbeing = Math.max(0, s.stats.wellbeing - 0.3);
  if (hasMod("homeless_history"))    s.stats.wellbeing = Math.max(0, s.stats.wellbeing - 0.5);
  s.stats.health = Math.round(s.stats.health * 10) / 10;
  s.stats.wellbeing = Math.round(s.stats.wellbeing * 10) / 10;
  if (s.stats.health <= 0)    { s.gameOver = true; s.pendingForcedEnd = "ending_hospital"; }
  if (s.stats.wellbeing <= 0) { s.gameOver = true; s.pendingForcedEnd = "ending_breakdown"; }
}
function clamp(x, lo, hi) { return Math.max(lo, Math.min(hi, x)); }

function renderStats() {
  document.getElementById("v-health").textContent = state.stats.health;
  document.getElementById("b-health").style.width = state.stats.health + "%";
  document.getElementById("v-well").textContent = state.stats.wellbeing;
  document.getElementById("b-well").style.width = state.stats.wellbeing + "%";
  document.getElementById("v-money").textContent = Math.round(state.stats.money).toLocaleString();
  document.getElementById("v-law").textContent = Math.round(state.law);
  document.getElementById("b-law").style.width = Math.min(100, state.law) + "%";
  document.getElementById("law-wrap").classList.toggle("hot", state.law >= 60);

  document.body.classList.toggle("alert-law", state.law >= 80);

  const modsEl = document.getElementById("mods");
  modsEl.innerHTML = Array.from(state.char.modifiers)
    .filter(k => modifierDefs[k] && !modifierDefs[k].neutral)
    .map(k => `<span class="chip">${modifierDefs[k].name}</span>`)
    .join("");

  document.getElementById("char-name").textContent = state.char.name ? `· ${state.char.name}` : "";
}

function renderScene(sceneId, pendingFeedback) {
  const scene = state.sceneMap[sceneId];
  if (!scene) { renderEnding("ending_mid"); return; }
  if (scene.ending) { renderEnding(sceneId); return; }

  const game = document.getElementById("game");
  const fbHtml = pendingFeedback ? renderFeedback(pendingFeedback) : "";

  game.innerHTML = `
    ${fbHtml}
    <div class="scene">
      <div class="title">${scene.title}</div>
      ${typeof scene.text === "function" ? scene.text() : scene.text}
    </div>
    <div class="choices" id="choices"></div>
  `;

  const letters = "ABCDEFGH";
  const cEl = document.getElementById("choices");
  const order = scene.choices.map((_, i) => i);
  for (let i = order.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [order[i], order[j]] = [order[j], order[i]];
  }
  order.forEach((origIdx, displayIdx) => {
    const c = scene.choices[origIdx];
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.innerHTML = `<span class="letter">[${letters[displayIdx]}]</span>${escapeHtml(typeof c.label === "function" ? c.label(state) : c.label)}`;
    btn.onclick = () => pickChoice(sceneId, origIdx);
    cEl.appendChild(btn);
  });

  window.scrollTo({ top: 0, behavior: "smooth" });
}

function renderFeedback(fb) {
  const d = fb.delta || {};
  const deltas = [];
  if (d.money)     deltas.push(`<span class="delta ${d.money >= 0 ? 'pos' : 'neg'}">${d.money >= 0 ? '+' : ''}$${Math.round(d.money)}</span>`);
  if (d.health)    deltas.push(`<span class="delta ${d.health >= 0 ? 'pos' : 'neg'}">${d.health >= 0 ? '+' : ''}${d.health} Health</span>`);
  if (d.wellbeing) deltas.push(`<span class="delta ${d.wellbeing >= 0 ? 'pos' : 'neg'}">${d.wellbeing >= 0 ? '+' : ''}${d.wellbeing} Wellbeing</span>`);
  if (d.law)       deltas.push(`<span class="delta ${d.law >= 0 ? 'neg' : 'pos'}">${d.law >= 0 ? '+' : ''}${Math.round(d.law)} Law</span>`);
  const deltaBlock = deltas.length ? `<div class="deltas">${deltas.join("")}</div>` : "";
  const label = fb.kind === "good" ? "✓ Good call" : fb.kind === "bad" ? "✗ Bad call" : "~ Mixed bag";
  return `<div class="feedback ${fb.kind}"><div class="label">${label}</div>${escapeHtml(fb.text || "")}${deltaBlock}</div>`;
}

function resolveEffects(effects) {
  const out = {};
  Object.entries(effects || {}).forEach(([k, v]) => {
    out[k] = typeof v === "function" ? v() : v;
  });
  return out;
}

function pickChoice(sceneId, choiceIdx) {
  const scene = state.sceneMap[sceneId];
  const choice = scene.choices[choiceIdx];

  const resolved = resolveEffects(choice.effects);
  const before = { money: state.stats.money, health: state.stats.health, wellbeing: state.stats.wellbeing, law: state.law };

  logChoice(scene.title + " — " + (typeof scene.text === "function" ? scene.text() : scene.text).split("\n")[0], scene.choices, choiceIdx);

  applyEffects(state, resolved);
  if (choice.onRun) choice.onRun();
  state.turn += 1;

  const delta = {
    money: state.stats.money - before.money,
    health: state.stats.health - before.health,
    wellbeing: state.stats.wellbeing - before.wellbeing,
    law: state.law - before.law,
  };

  flashBody(choice.kind);
  renderStats();

  const feedback = { kind: choice.kind, text: choice.feedback, delta };

  if (state.gameOver && state.pendingForcedEnd) {
    renderEnding(state.pendingForcedEnd);
    return;
  }

  let nextId = choice.next ? choice.next(state) : choice.nextId;

  // Pending scheduled event interrupt
  const pending = checkPendingEvents();
  if (pending && nextId !== null && state.sceneMap[pending]) {
    const resumeId = nextId;
    nextId = pending;
    state.sceneMap[pending]._resumeTo = resumeId;
  }

  if (nextId === null) {
    const resume = scene._resumeTo || "finale";
    scene._resumeTo = null;
    renderScene(resume, feedback);
  } else {
    renderScene(nextId, feedback);
  }
}

function flashBody(kind) {
  const cls = kind === "good" ? "flash-good" : kind === "bad" ? "flash-bad" : "flash-mid";
  document.body.classList.remove("flash-good", "flash-bad", "flash-mid");
  void document.body.offsetWidth;
  document.body.classList.add(cls);
  setTimeout(() => document.body.classList.remove(cls), 800);
}

function renderEnding(endingId) {
  const e = state.sceneMap[endingId] || sharedEndings[endingId] || { kind: "mid", title: "END", text: () => "The story ends here." };
  const game = document.getElementById("game");
  const kind = e.kind || "mid";

  const edu = educationalContent[state.currentScenario];
  const reasons = edu ? edu.analyze(state) : [];
  const lessons = edu ? edu.lessons : [];

  const reasonIcons = { good: "✓", bad: "✗", mid: "~" };
  const reasonsHtml = reasons.length ? `
    <div class="ending-analysis">
      <h3>Why you got this ending</h3>
      ${reasons.map(r => `<div class="reason ${r.kind}"><span class="ic">${reasonIcons[r.kind]}</span><span>${escapeHtml(r.text)}</span></div>`).join("")}
    </div>
  ` : "";

  const lessonsHtml = lessons.length ? `
    <div class="ending-analysis">
      <h3>💡 Key takeaways — remember these for real life</h3>
      ${lessons.map(l => `<div class="lesson"><div class="t">${escapeHtml(l.t)}</div><div class="d">${escapeHtml(l.d)}</div></div>`).join("")}
    </div>
  ` : "";

  game.innerHTML = `
    <div class="ending ${kind}">
      <h1 class="${kind}">${e.title}</h1>
      <div class="narrative">${(typeof e.text === "function" ? e.text() : e.text).replace(/\n/g, "<br>")}</div>
      <div class="stats-line">
        Health: <b>${state.stats.health}</b> · Wellbeing: <b>${state.stats.wellbeing}</b> · Cash: <b>$${Math.round(state.stats.money).toLocaleString()}</b> · Law heat: <b>${Math.round(state.law)}%</b>
      </div>
      ${reasonsHtml}
      ${lessonsHtml}
      <div class="actions-row">
        <button class="restart" onclick="returnToMenu()">← New game</button>
        <button class="restart ghost" onclick="toggleDrawer()">📓 Review notebook</button>
      </div>
    </div>
  `;
  renderStats();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function logChoice(question, choices, pickedIdx) {
  const picked = choices[pickedIdx];
  state.notebook.push({
    turn: state.turn,
    q: question,
    pickedLabel: typeof picked.label === "function" ? picked.label(state) : picked.label,
    feedback: picked.feedback,
    kind: picked.kind,
    others: choices.filter((_, i) => i !== pickedIdx).map(c => typeof c.label === "function" ? c.label(state) : c.label)
  });
}

function renderNotebook() {
  const el = document.getElementById("notes");
  if (!state || !state.notebook?.length) {
    el.innerHTML = `<div style="color: var(--muted); font-size: 14px; padding: 20px 0;">Your notebook is empty. Make some choices and they'll show up here.</div>`;
    return;
  }
  el.innerHTML = state.notebook.slice().reverse().map(n => `
    <div class="note">
      <div class="day-tag">Turn ${n.turn + 1}</div>
      <div class="q">${escapeHtml(n.q)}</div>
      <div class="a-picked ${n.kind}">✓ ${escapeHtml(n.pickedLabel)}</div>
      ${n.feedback ? `<div class="a-fb">${escapeHtml(n.feedback)}</div>` : ""}
      ${n.others.length ? `<div style="font-size: 11px; color: var(--muted); text-transform: uppercase; font-weight: 700; letter-spacing: 0.8px; margin: 8px 0 4px;">Roads not taken</div>` : ""}
      ${n.others.map(o => `<div class="a-other">${escapeHtml(o)}</div>`).join("")}
    </div>
  `).join("");
}
function escapeHtml(s) { return (s || "").replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m])); }

function startCampaign(id) {

  state.char.name = sc.defaultName;
  state.currentScenario = id;
  state.sceneMap = sc.scenes;
  showGameUI();
  renderStats();
  renderScene(sc.startId, null);
}

function startFreeplaySetup(scenarioId) {
  document.getElementById("stats-wrap").style.display = "none";
  document.getElementById("notebook-btn").style.display = "none";
  document.getElementById("menu-btn").style.display = "inline-block";
  const sc = scenarios[scenarioId];
  const game = document.getElementById("game");

  const groupsHtml = modifierGroups.map(g => `
    <div class="setup-card">
      <h3>${escapeHtml(g.label)}</h3>
      <div class="q">${escapeHtml(g.q)}</div>
      <div class="setup-opts" data-group="${g.id}">
        ${g.opts.map(o => `
          <div class="setup-opt" data-val="${o.val}">
            <span class="t">${escapeHtml(o.t)}</span>
            <span class="d">${escapeHtml(o.d)}</span>
          </div>
        `).join("")}
      </div>
    </div>
  `).join("");

  game.innerHTML = `
    <div class="scene">
      <div class="title">Freeplay · ${sc.name}</div>
      <h2>Build your character</h2>
      <div style="color: var(--muted); margin: 6px 0 8px;">Your answers shift starting stats, passive drains, and how likely things go right or wrong in "${sc.name}". Playing as <b>${sc.defaultName}</b>. Pick one option in each category — ${modifierGroups.length} total.</div>
    </div>
    ${groupsHtml}
    <button class="restart" id="begin-btn" onclick="beginFreeplay('${scenarioId}')" disabled style="opacity:0.4">Begin →</button>
    <button class="restart ghost" onclick="returnToMenu()">Cancel</button>
  `;
  document.querySelectorAll(".setup-opts").forEach(group => {
    group.querySelectorAll(".setup-opt").forEach(opt => {
      opt.onclick = () => {
        group.querySelectorAll(".setup-opt").forEach(o => o.classList.remove("selected"));
        opt.classList.add("selected");
        checkSetupDone();
      };
    });
  });
  window.scrollTo({ top: 0, behavior: "smooth" });
}
function checkSetupDone() {
  const done = modifierGroups.every(g => document.querySelector(`.setup-opts[data-group="${g.id}"] .setup-opt.selected`));
  const btn = document.getElementById("begin-btn");
  btn.disabled = !done;
  btn.style.opacity = done ? "1" : "0.4";
}

function beginFreeplay(scenarioId) {
  const mods = modifierGroups.map(g =>
    document.querySelector(`.setup-opts[data-group="${g.id}"] .setup-opt.selected`).dataset.val
  );
  const sc = scenarios[scenarioId];
  state = freshState(sc.startMoney);
  state.char.name = sc.defaultName;
  mods.forEach(m => state.char.modifiers.add(m));
  applyStartingModifiers(state);
  state.currentScenario = scenarioId;
  state.sceneMap = sc.scenes;
  showGameUI();
  renderStats();
  renderScene(sc.startId, null);
}

function showGameUI() {
  document.getElementById("stats-wrap").style.display = "block";
  document.getElementById("notebook-btn").style.display = "inline-block";
  document.getElementById("menu-btn").style.display = "inline-block";
}

function returnToMenu() {
  document.body.classList.remove("alert-law", "flash-good", "flash-bad", "flash-mid");
  renderMenu();
}

// ============================================================
// UI TOGGLES
// ============================================================
function toggleDark() {
  document.body.classList.toggle("dark");
  try { localStorage.setItem("ns_dark", document.body.classList.contains("dark") ? "1" : "0"); } catch(e){}
}
function toggleDrawer() {
  document.getElementById("drawer").classList.toggle("open");
  document.getElementById("drawer-bg").classList.toggle("open");
  renderNotebook();
}

// ============================================================
// BOOT
// ============================================================
try { if (localStorage.getItem("ns_dark") === "1") document.body.classList.add("dark"); } catch(e){}
renderMenu();
</script>
</body>
