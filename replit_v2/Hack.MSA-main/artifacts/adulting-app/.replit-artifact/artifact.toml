kind = "mobile"
previewPath = "/"
title = "Adulting 101"
version = "1.0.0"
id = "artifacts/adulting-app"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 19969

[services.development]
run = "pnpm --filter @workspace/adulting-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/adulting-app", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/adulting-app", "run", "serve" ]

[services.env]
PORT = "19969"
BASE_PATH = "/"
