kind = "web"
previewPath = "/adulting-simulator/"
title = "Adulting Simulator"
version = "1.0.0"
id = "artifacts/adulting-simulator"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/adulting-simulator/" ]
localPort = 19699

[services.development]
run = "pnpm --filter @workspace/adulting-simulator run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/adulting-simulator", "run", "build" ]
publicDir = "artifacts/adulting-simulator/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19699"
BASE_PATH = "/adulting-simulator/"
